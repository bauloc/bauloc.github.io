<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BAULOC — Mobile Developer">
  <meta property="og:title" content="bauloc.github.io">
  <meta property="og:description" content="BAULOC — Mobile Developer">
  <title>bauloc.github.io</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --border-hover: #4f6ef7;
      --accent:   #4f6ef7;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --mono:     "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .prompt {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .prompt-symbol {
      color: var(--accent);
      user-select: none;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .tagline {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 280px);
      gap: 16px;
    }

    @media (max-width: 620px) {
      .cards {
        grid-template-columns: 1fr;
        width: 100%;
        max-width: 320px;
      }
    }

    .card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px 22px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,110,247,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(79,110,247,0.15);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 16px;
      line-height: 1;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .card-link svg {
      transition: transform 0.15s;
    }

    .card:hover .card-link svg {
      transform: translateX(3px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="prompt">
      <span class="prompt-symbol">~&gt;</span>
      <span>bauloc.github.io</span>
      <span class="cursor"></span>
    </div>
    <p class="tagline">// Software Developer, Electrical &amp; Electronic Engineer</p>
  </header>

  <main class="cards">
    <a class="card" href="/profile/">
      <div class="card-icon">👤</div>
      <div class="card-title">Profile</div>
      <div class="card-desc">Personal portfolio — projects, skills & contact. Built with Flutter.</div>
      <span class="card-link">
        Open
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8.22 2.97a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06l2.97-2.97H3.75a.75.75 0 0 1 0-1.5h7.44L8.22 4.03a.75.75 0 0 1 0-1.06z"/>
        </svg>
      </span>
    </a>

    <a class="card" href="/xconsole/">
      <div class="card-icon">⚙️</div>
      <div class="card-title">XConsole</div>
      <div class="card-desc">GitHub-based admin console for managing app Terms & Privacy pages.</div>
      <span class="card-link">
        Open
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8.22 2.97a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06l2.97-2.97H3.75a.75.75 0 0 1 0-1.5h7.44L8.22 4.03a.75.75 0 0 1 0-1.06z"/>
        </svg>
      </span>
    </a>
  </main>

  <footer class="footer">
    <a href="https://github.com/bauloc" target="_blank" rel="noopener">github.com/bauloc</a>
  </footer>

</body>
</html>
